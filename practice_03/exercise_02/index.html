<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Goals</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">TRAVEL GOALS</div>
        <nav>
            <a href="#">Get Started</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>
        <!-- HERO SECTION -->
        <section class="hero">
            <div class="hero-content">
                <h1>JOE'S TRAVEL PAGE</h1>
                <p>LET'S EXPLORE THE WORLD TOGETHER</p>
                <a href="#" class="btn-discover">Discover places</a>
            </div>
        </section>

        <!-- HIGHLIGHTS SECTION -->
        <section class="highlights">
            <h2>HIGHLIGHTS</h2>
            <div class="places">
                <div class="place">
                    <div class="place-img miami"></div>
                    <p>MIAMI USA</p>
                </div>
                <div class="place">
                    <div class="place-img munich"></div>
                    <p>MUNICH GERMANY</p>
                </div>
                <div class="place">
                    <div class="place-img barcelona"></div>
                    <p>BARCELONA SPAIN</p>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
    </footer>

</body>
</html>

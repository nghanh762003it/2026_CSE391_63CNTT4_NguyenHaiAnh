<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Form Đăng Ký</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>📝 Đăng Ký Tài Khoản</h2>

        <!-- Form đăng ký -->
        <form id="registerForm">

            <!-- Họ và tên (thêm đếm ký tự) -->
            <div class="form-group">
                <label>Họ và tên <span class="required">*</span></label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên">
                <span class="char-count" id="fullnameCount">0/50</span>
                <span class="error" id="fullnameError"></span>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="text" id="email" placeholder="Nhập email">
                <span class="error" id="emailError"></span>
            </div>

            <!-- Số điện thoại -->
            <div class="form-group">
                <label>Số điện thoại <span class="required">*</span></label>
                <input type="text" id="phone" placeholder="Nhập số điện thoại">
                <span class="error" id="phoneError"></span>
            </div>

            <!-- Mật khẩu (thêm toggle + strength bar) -->
            <div class="form-group">
                <label>Mật khẩu <span class="required">*</span></label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Nhập mật khẩu">
                    <button type="button" id="togglePassword">👁</button>
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <span class="strength-text" id="strengthText"></span>
                <span class="error" id="passwordError"></span>
            </div>

            <!-- Xác nhận mật khẩu (thêm toggle) -->
            <div class="form-group">
                <label>Xác nhận mật khẩu <span class="required">*</span></label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                    <button type="button" id="toggleConfirm">👁</button>
                </div>
                <span class="error" id="confirmPasswordError"></span>
            </div>

            <!-- Giới tính -->
            <div class="form-group">
                <label>Giới tính <span class="required">*</span></label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Nam"> Nam
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Nữ"> Nữ
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Khác"> Khác
                    </label>
                </div>
                <span class="error" id="genderError"></span>
            </div>

            <!-- Điều khoản -->
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="terms">
                    Tôi đồng ý với <a href="#">điều khoản sử dụng</a>
                </label>
                <span class="error" id="termsError"></span>
            </div>

            <button type="submit">Đăng Ký</button>
        </form>

        <!-- Thông báo thành công (ẩn ban đầu) -->
        <div class="success-message" id="successMessage">
            <h3>🎉 Đăng ký thành công!</h3>
            <p>Xin chào, <span id="successName"></span>!</p>
            <p>Tài khoản của bạn đã được tạo thành công.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>

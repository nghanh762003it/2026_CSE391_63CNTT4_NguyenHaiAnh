<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Nhiều Bước</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>📝 Đăng Ký Tài Khoản</h2>

        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="step-indicator active" id="indicator1">
                <div class="circle">1</div>
                <span>Cá nhân</span>
            </div>
            <div class="line" id="line1"></div>
            <div class="step-indicator" id="indicator2">
                <div class="circle">2</div>
                <span>Tài khoản</span>
            </div>
            <div class="line" id="line2"></div>
            <div class="step-indicator" id="indicator3">
                <div class="circle">3</div>
                <span>Xác nhận</span>
            </div>
        </div>

        <!-- Bước 1: Thông tin cá nhân -->
        <div class="step" id="step1">
            <h3>Bước 1 — Thông tin cá nhân</h3>

            <div class="form-group">
                <label>Họ và tên <span class="required">*</span></label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên">
                <span class="error" id="fullnameError"></span>
            </div>

            <div class="form-group">
                <label>Ngày sinh <span class="required">*</span></label>
                <input type="date" id="dob">
                <span class="error" id="dobError"></span>
            </div>

            <div class="form-group">
                <label>Giới tính <span class="required">*</span></label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Nam"> Nam
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Nữ"> Nữ
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Khác"> Khác
                    </label>
                </div>
                <span class="error" id="genderError"></span>
            </div>

            <div class="btn-group">
                <div></div>
                <button type="button" id="btnNext1">Tiếp theo →</button>
            </div>
        </div>

        <!-- Bước 2: Thông tin tài khoản -->
        <div class="step" id="step2" style="display:none">
            <h3>Bước 2 — Thông tin tài khoản</h3>

            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="text" id="email" placeholder="Nhập email">
                <span class="error" id="emailError"></span>
            </div>

            <div class="form-group">
                <label>Mật khẩu <span class="required">*</span></label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
                <span class="error" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu <span class="required">*</span></label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                <span class="error" id="confirmPasswordError"></span>
            </div>

            <div class="btn-group">
                <button type="button" id="btnBack2">← Quay lại</button>
                <button type="button" id="btnNext2">Tiếp theo →</button>
            </div>
        </div>

        <!-- Bước 3: Xác nhận -->
        <div class="step" id="step3" style="display:none">
            <h3>Bước 3 — Xác nhận thông tin</h3>

            <div class="confirm-info" id="confirmInfo"></div>

            <div class="btn-group">
                <button type="button" id="btnBack3">← Quay lại</button>
                <button type="button" id="btnSubmit">✅ Hoàn tất</button>
            </div>
        </div>

        <!-- Thành công -->
        <div class="success-message" id="successMessage">
            <h3>🎉 Đăng ký thành công!</h3>
            <p>Xin chào, <span id="successName"></span>!</p>
            <p>Tài khoản của bạn đã được tạo thành công.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

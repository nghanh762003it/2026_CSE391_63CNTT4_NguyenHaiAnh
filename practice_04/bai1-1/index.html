<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Điểm Sinh Viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>📋 Bảng Điểm Sinh Viên</h2>

    <div class="input-group">
        <input type="text" id="inputName" placeholder="Họ và tên">
        <input type="number" id="inputScore" placeholder="Điểm (0-10)" min="0" max="10" step="0.1">
        <button id="btnAdd">Thêm</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="stats" id="stats">Tổng: 0 sinh viên | Điểm TB: 0.00</div>

    <script src="script.js"></script>
</body>
</html>

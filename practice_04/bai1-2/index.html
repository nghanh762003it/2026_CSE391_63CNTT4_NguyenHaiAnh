<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Điểm - Tìm Kiếm & Lọc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>📋 Bảng Điểm Sinh Viên</h2>

    <!-- Nhập liệu -->
    <div class="input-group">
        <input type="text" id="inputName" placeholder="Họ và tên">
        <input type="number" id="inputScore" placeholder="Điểm (0-10)" min="0" max="10" step="0.1">
        <button id="btnAdd">Thêm</button>
    </div>

    <!-- Tìm kiếm + Lọc -->
    <div class="filter-group">
        <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm theo tên...">
        <select id="filterGrade">
            <option value="all">Tất cả</option>
            <option value="Giỏi">Giỏi</option>
            <option value="Khá">Khá</option>
            <option value="Trung bình">Trung bình</option>
            <option value="Yếu">Yếu</option>
        </select>
    </div>

    <!-- Bảng -->
    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th id="scoreHeader" class="sortable">
                    Điểm <span id="sortArrow"></span>
                </th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="stats" id="stats">Tổng: 0 sinh viên | Điểm TB: 0.00</div>

    <script src="script.js"></script>
</body>
</html>
